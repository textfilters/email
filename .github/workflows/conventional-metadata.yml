name: Conventional Metadata

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
  push:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  conventional-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check conventional metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_COMMITS_URL: ${{ github.event.pull_request.commits_url }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|release|revert|style|test)(\([a-z0-9._-]+\))?!?: .+'
          failures=0

          check_subject() {
            local label="$1"
            local subject="$2"
            if [[ ! "$subject" =~ $pattern ]]; then
              echo "::error title=Invalid conventional metadata::${label} must follow Conventional Commits: ${subject}"
              failures=1
            fi
          }

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            check_subject "PR title" "$PR_TITLE"
            while IFS= read -r subject; do
              check_subject "Commit subject" "$subject"
            done < <(gh api --paginate "$PR_COMMITS_URL" --jq '.[].commit.message | split("\n")[0]')
          else
            if [[ "$PUSH_BEFORE" =~ ^0+$ ]]; then
              git log --format=%s -n 1 "$PUSH_AFTER" > /tmp/commit-subjects
            else
              git log --format=%s "${PUSH_BEFORE}..${PUSH_AFTER}" > /tmp/commit-subjects
            fi
            while IFS= read -r subject; do
              check_subject "Commit subject" "$subject"
            done < /tmp/commit-subjects
          fi

          exit "$failures"
