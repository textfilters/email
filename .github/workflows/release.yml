name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@textfilters"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          package_name="$(node -p "require('./package.json').name")"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if release tag already exists
        if: steps.version.outputs.tag_exists == 'true'
        run: |
          set -euo pipefail
          echo "${{ steps.version.outputs.tag }} already exists; skipping release."

      - name: Check package version
        if: steps.version.outputs.tag_exists != 'true'
        id: package
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if npm view "${{ steps.version.outputs.package_name }}@${{ steps.version.outputs.version }}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Packages
        if: steps.version.outputs.tag_exists != 'true' && steps.package.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: npm publish --registry=https://npm.pkg.github.com

      - name: Create release tag
        if: steps.version.outputs.tag_exists != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}" "$GITHUB_SHA"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.version.outputs.tag_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ steps.version.outputs.tag }}"
          --verify-tag
          --target "$GITHUB_SHA"
          --title "${{ steps.version.outputs.tag }}"
          --generate-notes
